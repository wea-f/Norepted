    <main>
      <!-- ===== SHORTS ===== -->
      <section id="view-shorts" class="spa-section active-section">
        <div class="page-header fade-in">
          <h2 class="page-title">Shorts Scroller</h2>
          <p class="page-sub">Scroll through YouTube Shorts. Hover the video and use ↑ ↓ or mouse wheel to cycle videos. </p>
        </div>

        <div class="shorts-controls card fade-in">
          <div class="input-row">
            <input type="text" id="shortsSearchInput" placeholder="Search for Shorts… (e.g. funny cats)"/>
            <button id="shortsSearchBtn" class="btn-primary">Find Shorts</button>
          </div>
          <p class="page-sub" style="margin-top:8px;font-size:0.8rem;">
            Or paste a Shorts URL: <input type="text" id="shortsPasteInput" placeholder="https://youtube.com/shorts/…" style="width:260px;display:inline-block;padding:6px 12px;font-size:13px;margin-left:8px;"/> 
            <button onclick="addShortsFromUrl()" class="ghost-btn" style="margin-left:6px;">Add</button>
          </p>
        </div>

        <div class="shorts-viewer fade-in" id="shortsViewer">
          <div class="shorts-frame-wrap" id="shortsFrameWrap">
            <!-- iframes injected by JS -->
          </div>
          <div class="shorts-nav">
            <button class="shorts-nav-btn" id="shortsPrev" onclick="navigateShort(-1)" title="Previous">↑</button>
            <span class="shorts-counter" id="shortsCounter">0 / 0</span>
            <button class="shorts-nav-btn" id="shortsNext" onclick="navigateShort(1)" title="Next">↓</button>
            <button class="shorts-pause-btn" id="shortsPause" onclick="toggleShortPlayback()" title="Pause or play">Pause</button>

            <button class="shorts-nav-btn shorts-mute-btn" id="shortsMute" onclick="toggleShortsMute()" title="Unmute video" style="margin-left: 6px;">🔇 Unmute</button>

            <button class="shorts-nav-btn fallback-shorts-btn" id="shortsFallback" onclick="tryNextShortsSource()" title="Try another server mirror" style="margin-left: 6px;">↺ Source</button>
          </div>

          <button id="shortsLoadMore" class="ghost-btn" style="margin-top: 12px; display: none;">Load More</button>

          <div class="shorts-empty" id="shortsEmpty">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity:0.25;margin-bottom:12px;"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99z"/></svg>
            <p>Search for Shorts above or paste a URL to get started.</p>
          </div>
        </div>
